name: Build GTAV Runtime Inspector v7.2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "GTAV_Mobile_Runtime_Source_v7.2_final.zip"
      - "box64_bundle.zip"
      - "box64_bundle.json"
      - ".github/workflows/main.yml"

permissions:
  contents: read

concurrency:
  group: gtav-v7-2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build v7.2 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    defaults:
      run:
        shell: bash

    env:
      SOURCE_ZIP: ${{ github.workspace }}/GTAV_Mobile_Runtime_Source_v7.2.1_fixed.zip
      BOX64_BUNDLE_ZIP: ${{ github.workspace }}/box64_bundle.zip
      BOX64_BUNDLE_JSON: ${{ github.workspace }}/box64_bundle.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate required inputs
        id: inputs
        run: |
          set -Eeuo pipefail

          for file in \
            "$SOURCE_ZIP" \
            "$BOX64_BUNDLE_ZIP" \
            "$BOX64_BUNDLE_JSON"
          do
            if [[ ! -f "$file" ]]; then
              echo "ERROR: Required input is missing: $file"
              echo "Repository files:"
              find "$GITHUB_WORKSPACE" -maxdepth 2 -type f -printf '%P\n' | sort
              exit 1
            fi
          done

          echo "source_sha256=$(sha256sum "$SOURCE_ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "bundle_sha256=$(sha256sum "$BOX64_BUNDLE_ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

          ls -lh "$SOURCE_ZIP" "$BOX64_BUNDLE_ZIP" "$BOX64_BUNDLE_JSON"

      - name: Extract Android project
        run: |
          set -Eeuo pipefail

          EXTRACT_ROOT="$RUNNER_TEMP/gtav-v7.2-source"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"

          unzip -q -o "$SOURCE_ZIP" -d "$EXTRACT_ROOT"

          SETTINGS_FILE="$(
            find "$EXTRACT_ROOT" \
              -type f \
              \( -name settings.gradle.kts -o -name settings.gradle \) \
              | sort \
              | head -n 1
          )"

          if [[ -z "$SETTINGS_FILE" || ! -f "$SETTINGS_FILE" ]]; then
            echo "ERROR: Android project was not found in the source ZIP."
            find "$EXTRACT_ROOT" -maxdepth 8 -type f -printf '%P\n' | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

          test -f "$PROJECT_DIR/app/build.gradle.kts" || \
            test -f "$PROJECT_DIR/app/build.gradle"

          echo "Project directory: $PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -Eeuo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: false

      - name: Inject and verify Box64
        id: box64
        run: |
          set -Eeuo pipefail

          chmod +x "$PROJECT_DIR/INJECT_BOX64_BEFORE_BUILD.sh"

          "$PROJECT_DIR/INJECT_BOX64_BEFORE_BUILD.sh" \
            "$PROJECT_DIR" \
            "$BOX64_BUNDLE_ZIP" \
            "$BOX64_BUNDLE_JSON"

          BOX64_FILE="$PROJECT_DIR/app/src/main/jniLibs/arm64-v8a/libbox64.so"
          test -s "$BOX64_FILE"

          BOX64_SHA256="$(sha256sum "$BOX64_FILE" | awk '{print $1}')"
          BOX64_SIZE="$(stat -c '%s' "$BOX64_FILE")"

          echo "sha256=$BOX64_SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$BOX64_SIZE" >> "$GITHUB_OUTPUT"

      - name: Validate Gradle project
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"
          gradle projects --no-daemon --stacktrace

      - name: Build v7.2 APK
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"
          gradle \
            :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      - name: Validate generated APK and embedded Box64
        id: apk
        run: |
          set -Eeuo pipefail

          APK_FILE="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name '*.apk' \
              | sort \
              | head -n 1
          )"

          if [[ -z "$APK_FILE" || ! -f "$APK_FILE" ]]; then
            echo "ERROR: APK was not generated."
            exit 1
          fi

          APK_BOX64_ENTRY="$(
            unzip -Z1 "$APK_FILE" |
              awk '$0 == "lib/arm64-v8a/libbox64.so" {print; exit}'
          )"

          if [[ -z "$APK_BOX64_ENTRY" ]]; then
            echo "ERROR: lib/arm64-v8a/libbox64.so is missing from the APK."
            unzip -Z1 "$APK_FILE" | grep '^lib/' || true
            exit 1
          fi

          TMP_BOX64="$RUNNER_TEMP/libbox64-from-apk.so"
          unzip -p "$APK_FILE" "$APK_BOX64_ENTRY" > "$TMP_BOX64"

          EMBEDDED_SHA256="$(sha256sum "$TMP_BOX64" | awk '{print $1}')"
          if [[ "$EMBEDDED_SHA256" != "${{ steps.box64.outputs.sha256 }}" ]]; then
            echo "ERROR: Embedded Box64 SHA-256 mismatch."
            exit 1
          fi

          OUTPUT_DIR="$RUNNER_TEMP/gtav-v7.2-output"
          OUTPUT_APK="$OUTPUT_DIR/GTAV-Runtime-v7.2.apk"
          mkdir -p "$OUTPUT_DIR"
          cp "$APK_FILE" "$OUTPUT_APK"

          APK_SHA256="$(sha256sum "$OUTPUT_APK" | awk '{print $1}')"
          APK_SIZE="$(stat -c '%s' "$OUTPUT_APK")"

          printf '%s  %s\n' \
            "$APK_SHA256" \
            "$(basename "$OUTPUT_APK")" \
            > "$OUTPUT_APK.sha256"

          cat > "$OUTPUT_DIR/build_provenance.json" <<JSON
          {
            "source_zip_sha256": "${{ steps.inputs.outputs.source_sha256 }}",
            "box64_bundle_sha256": "${{ steps.inputs.outputs.bundle_sha256 }}",
            "box64_payload_sha256": "${{ steps.box64.outputs.sha256 }}",
            "box64_payload_size_bytes": ${{ steps.box64.outputs.size }},
            "apk_sha256": "$APK_SHA256",
            "apk_size_bytes": $APK_SIZE,
            "git_commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          JSON

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "sha256=$APK_SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$APK_SIZE" >> "$GITHUB_OUTPUT"

          unzip -t "$OUTPUT_APK"
          ls -lh "$OUTPUT_DIR"

      - name: Upload v7.2 APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-v7.2-${{ github.run_number }}
          path: |
            ${{ env.OUTPUT_DIR }}/GTAV-Runtime-v7.2.apk
            ${{ env.OUTPUT_DIR }}/GTAV-Runtime-v7.2.apk.sha256
            ${{ env.OUTPUT_DIR }}/build_provenance.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-v7.2-failure-${{ github.run_number }}
          path: |
            ${{ env.PROJECT_DIR }}/app/build/reports/**
            ${{ env.PROJECT_DIR }}/app/build/outputs/**
            ${{ env.PROJECT_DIR }}/.gradle/**
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 6

      - name: Build summary
        if: always()
        run: |
          {
            echo "## GTA V Runtime Inspector v7.2"
            echo
            echo "- Source ZIP SHA-256: \`${{ steps.inputs.outputs.source_sha256 }}\`"
            echo "- Box64 bundle SHA-256: \`${{ steps.inputs.outputs.bundle_sha256 }}\`"
            echo "- Box64 payload SHA-256: \`${{ steps.box64.outputs.sha256 || 'not-injected' }}\`"
            echo "- APK SHA-256: \`${{ steps.apk.outputs.sha256 || 'not-generated' }}\`"
            echo "- APK size: \`${{ steps.apk.outputs.size || 'not-generated' }} bytes\`"
          } >> "$GITHUB_STEP_SUMMARY"
