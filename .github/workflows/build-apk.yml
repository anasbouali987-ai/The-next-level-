name: Build GTAV Runtime Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-build
  cancel-in-progress: true

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-cleanup: on-success

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Run lint and build debug APK
        shell: bash
        run: gradle --no-daemon --stacktrace lintDebug assembleDebug

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/GTAV-Runtime-Manager-v1.3.1-debug.apk
          sha256sum dist/GTAV-Runtime-Manager-v1.3.1-debug.apk > dist/SHA256SUMS.txt
          ls -lh dist

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.3.1-APK
          path: dist/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
