name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Build and lint
        run: gradle --no-daemon --stacktrace clean lintDebug assembleDebug assembleRelease
      - name: Collect outputs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/GTAV-Runtime-Inspector-v1.1.0-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/GTAV-Runtime-Inspector-v1.1.0-release-unsigned.apk
          cp app/build/reports/lint-results-debug.html dist/lint-results-debug.html
          sha256sum dist/*.apk > dist/SHA256SUMS.txt
          ls -lh dist
      - uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Inspector-v1.1.0
          path: dist/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
