name: Build GTAV Runtime Manager v1.7 Experiment 4 — FIXED v3
run-name: GTAV v1.7 Exp4 — fixed-v3 — ${{ github.ref_name }}

"on":
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-v17-exp4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      WORKFLOW_REVISION: fixed-v3-no-source-integrity
      SOURCE_ARCHIVE: GTAV_Runtime_Manager_v1.7.0_Execution_Foundation_Experiment4_Comprehensive_Source_CORRECTED.zip
      # Optional repository variable. When absent, a tested full commit SHA is used.
      TERMUX_PACKAGES_REF: ${{ vars.TERMUX_PACKAGES_COMMIT }}
      DEFAULT_TERMUX_PACKAGES_REF: 17c04d8e63e4744a91590854cac9ee44f143e5e2
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm fixed workflow revision
        shell: bash
        run: |
          set -euo pipefail
          echo "WORKFLOW_REVISION=$WORKFLOW_REVISION"
          workflow=.github/workflows/build-apk.yml
          [[ -f "$workflow" ]] || {
            echo "ERROR: $workflow is missing. Replace the workflow at this exact path." >&2
            exit 1
          }
          grep -Fq 'WORKFLOW_REVISION: fixed-v3-no-source-integrity' "$workflow" || {
            echo 'ERROR: GitHub checked out an old or differently named workflow.' >&2
            exit 1
          }
          if grep -Fq -- '- name: Source integrity' "$workflow"; then
            echo 'ERROR: obsolete Source integrity step is still present.' >&2
            exit 1
          fi
          echo 'FIXED_WORKFLOW_CONFIRMED'

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail
          project="$(find . -maxdepth 4 -type f \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | sort | head -n 1 || true)"

          if [[ -z "$project" ]]; then
            zip="./$SOURCE_ARCHIVE"
            [[ -f "$zip" ]] || {
              echo "ERROR: required source archive not found: $SOURCE_ARCHIVE" >&2
              echo 'Delete old Runtime/Source ZIP files and upload the corrected archive with the exact name above.' >&2
              echo 'ZIP files currently present:' >&2
              find . -maxdepth 2 -type f -iname '*.zip' -print >&2 || true
              exit 1
            }
            rm -rf extracted-source
            mkdir -p extracted-source
            unzip -q "$zip" -d extracted-source
            project="$(find extracted-source -maxdepth 5 -type f \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | sort | head -n 1 || true)"
          fi

          [[ -n "$project" ]] || { echo 'ERROR: settings.gradle(.kts) not found'; exit 1; }
          project="${project#./}"
          [[ -f "$project/tools/provision-execution-components.sh" ]] || {
            echo 'ERROR: provision-execution-components.sh is missing from selected source.' >&2
            exit 1
          }
          echo "PROJECT_DIR=$project" >> "$GITHUB_ENV"
          echo "Project: $project"

      - name: Validate corrected source revision
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          bash -n tools/provision-execution-components.sh
          grep -Fq 'TERMUX_PROPERTIES_EVALUATION_INCOMPLETE' tools/provision-execution-components.sh || {
            echo 'ERROR: the selected source archive contains the old PRoot provisioning script.' >&2
            echo 'Upload the corrected source archive supplied with this workflow.' >&2
            exit 1
          }
          echo 'CORRECTED_SOURCE_CONFIRMED'

      - name: Source and architecture checks
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          bash tools/verify-source-boundaries.sh
          bash tools/verify-execution-architecture.sh

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and host build tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-36' 'build-tools;35.0.0'
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ gcc-x86-64-linux-gnu binutils dpkg-dev curl unzip zip file jq

      - name: Resolve Termux packages source revision
        shell: bash
        run: |
          set -euo pipefail

          ref="${TERMUX_PACKAGES_REF:-$DEFAULT_TERMUX_PACKAGES_REF}"
          [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo 'TERMUX_PACKAGES_COMMIT must be a full 40-character commit SHA.' >&2
            exit 1
          }

          proot_build="$(curl --fail --silent --show-error --location \n            --retry 4 --retry-delay 2 \n            "https://raw.githubusercontent.com/termux/termux-packages/${ref}/packages/proot/build.sh")"
          proot_version="$(printf '%s\n' "$proot_build" \n            | sed -n 's/^TERMUX_PKG_VERSION="\?\([^" ]*\)"\?$/\1/p' \n            | head -n 1)"
          [[ -n "$proot_version" ]] || {
            echo "Unable to determine the PRoot package version at $ref." >&2
            exit 1
          }

          echo "TERMUX_PACKAGES_REF=$ref" >> "$GITHUB_ENV"
          echo "EXPECTED_PROOT_VERSION=$proot_version" >> "$GITHUB_ENV"
          echo "Using pinned termux-packages commit: $ref"
          echo "Using PRoot package version: $proot_version"

      - name: Cache custom-prefix PRoot build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/.termux-packages/.termux-build
            ${{ env.PROJECT_DIR }}/.termux-packages/output
          key: proot-${{ runner.os }}-${{ env.TERMUX_PACKAGES_REF }}-${{ hashFiles(format('{0}/tools/provision-execution-components.sh', env.PROJECT_DIR)) }}

      - name: Provision Android ARM64 PRoot and x86_64 smoke ELF
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        env:
          PROOT_COMPONENT_BUNDLE_URL: ${{ secrets.PROOT_COMPONENT_BUNDLE_URL }}
          PROOT_COMPONENT_BUNDLE_SHA256: ${{ secrets.PROOT_COMPONENT_BUNDLE_SHA256 }}
        run: |
          set -euo pipefail
          bash tools/provision-execution-components.sh | tee "$GITHUB_WORKSPACE/execution-components-build.log"
          echo '--- PRoot ELF ---'
          readelf -h app/src/main/assets/execution/usr/bin/proot
          echo '--- PRoot loader ELF ---'
          readelf -h app/src/main/assets/execution/usr/libexec/proot/loader
          echo '--- x86_64 smoke ELF ---'
          readelf -h app/src/main/assets/execution/hello-x86_64

      - name: Build, test, lint, and validate Debug + Release
        id: gradle_build
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          if [[ -f ./gradlew ]]; then
            chmod +x ./gradlew
            GRADLE=(./gradlew)
          else
            GRADLE=(gradle)
          fi
          "${GRADLE[@]}" --no-daemon --stacktrace \
            testDebugUnitTest \
            lintDebug \
            assembleDebug \
            assembleRelease \
            assembleDebugAndroidTest \
            validateAllNativePackaging \
            2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Inspect APK execution payloads
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/apk-inspection"
          while IFS= read -r -d '' apk; do
            base="$(basename "$apk")"
            unzip -l "$apk" | tee "$GITHUB_WORKSPACE/apk-inspection/${base}.txt"
            echo "--- assets/execution in $base ---"
            unzip -l "$apk" | grep -E 'assets/execution/(usr/bin/proot|usr/libexec/proot/loader|hello-x86_64)' || true
            echo "--- lib/arm64-v8a in $base ---"
            unzip -l "$apk" | grep 'lib/arm64-v8a/' || true
          done < <(find app/build/outputs/apk -type f -name '*.apk' -print0 2>/dev/null || true)

      - name: Collect APKs and build reports
        if: success()
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$OUT/reports"
          debug="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          release="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          android_test="$(find app/build/outputs/apk/androidTest -type f -name '*.apk' | head -n 1 || true)"
          cp "$debug" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-debug.apk"
          cp "$release" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-release-unsigned.apk"
          [[ -z "$android_test" ]] || cp "$android_test" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-androidTest.apk"
          cp -a app/build/reports/native-packaging "$OUT/reports/" 2>/dev/null || true
          cp -a app/build/reports/execution-components "$OUT/reports/" 2>/dev/null || true
          cp -a execution-components/reports "$OUT/reports/provisioning" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/gradle-build.log" "$OUT/reports/"
          cp "$GITHUB_WORKSPACE/execution-components-build.log" "$OUT/reports/"
          cp -a "$GITHUB_WORKSPACE/apk-inspection" "$OUT/reports/"
          (
            cd "$OUT"
            sha256sum *.apk > SHA256SUMS.txt
          )
          {
            echo "App version: 1.7.0-exp4"
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_RUN_ID"
            echo "Requested ABI: arm64-v8a"
            echo "Variants: Debug, Release, androidTest"
            echo "Execution gates: PRoot, RootFS, Box64, Wine Console"
            echo "Future backends: Display/Audio/Graphics/Input NOT_IMPLEMENTED"
            echo
            find "$OUT/reports" -type f -printf '%P\n' | sort
          } > "$OUT/BUILD_INFO.txt"
          cat execution-components/reports/EXECUTION_COMPONENTS.txt > "$OUT/EXECUTION_COMPONENTS.txt"
          cat > "$OUT/FEATURE_FLAGS.txt" <<'EOF'
          PROOT=REQUESTED
          BOX64=REQUESTED
          WINE=REQUESTED
          DISPLAY=NOT_REQUESTED
          AUDIO=NOT_REQUESTED
          GRAPHICS=NOT_REQUESTED
          DXVK=NOT_REQUESTED
          INPUT=NOT_REQUESTED
          GAME_LIBRARY=NOT_REQUESTED
          EOF

      - name: Upload installable Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Installable
          path: |
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-debug.apk
            artifacts/SHA256SUMS.txt
            artifacts/BUILD_INFO.txt
            artifacts/EXECUTION_COMPONENTS.txt
            artifacts/FEATURE_FLAGS.txt
          compression-level: 0
          retention-days: 30

      - name: Upload Release and test APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Release-and-Tests
          path: |
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-release-unsigned.apk
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-androidTest.apk
            artifacts/SHA256SUMS.txt
          compression-level: 0
          retention-days: 30

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Build-Reports
          path: |
            artifacts/reports
            gradle-build.log
            execution-components-build.log
            apk-inspection
          if-no-files-found: warn
          compression-level: 0
          retention-days: 30
