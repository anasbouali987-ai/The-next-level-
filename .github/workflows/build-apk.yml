name: Build GTAV Runtime Manager v1.4.1 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.java"
      - "**/*.kt"
      - "**/*.kts"
      - "**/*.xml"
      - "**/*.zip"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-v1-4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find or extract Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_DIR="$RUNNER_TEMP/gtav-runtime-manager"
          mkdir -p "$EXTRACT_DIR"

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.git/*" \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print | sort | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            ZIP_FILE=""
            while IFS= read -r candidate; do
              if unzip -Z1 "$candidate" 2>/dev/null | \
                   grep -Eq '(^|/)settings\.gradle(\.kts)?$'; then
                ZIP_FILE="$candidate"
                break
              fi
            done < <(
              find "$GITHUB_WORKSPACE" \
                -maxdepth 4 \
                -type f \
                -iname "*.zip" \
                -not -path "*/.git/*" \
                -print | sort
            )

            if [ -z "${ZIP_FILE:-}" ]; then
              echo "::error::Android source project or a ZIP containing settings.gradle was not found."
              find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -not -path "*/.git/*" | sort
              exit 1
            fi

            echo "Extracting Android source archive: $ZIP_FILE"
            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            SETTINGS_FILE="$(
              find "$EXTRACT_DIR" \
                -type f \
                \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
                -not -path "*/.gradle/*" \
                -not -path "*/build/*" \
                -print | sort | head -n 1
            )"
          fi

          if [ -z "${SETTINGS_FILE:-}" ]; then
            echo "::error::settings.gradle or settings.gradle.kts was not found."
            find "$EXTRACT_DIR" -maxdepth 7 -type f | sort || true
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app" ]; then
            echo "::error::The app module was not found in: $PROJECT_DIR"
            find "$PROJECT_DIR" -maxdepth 4 -type f | sort
            exit 1
          fi

          if [ ! -f "$PROJECT_DIR/app/build.gradle.kts" ] && \
             [ ! -f "$PROJECT_DIR/app/build.gradle" ]; then
            echo "::error::The app Gradle build file was not found."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1 and cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-cleanup: on-success

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Run unit tests and build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:testDebugUnitTest :app:assembleDebug 2>&1 | \
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:testDebugUnitTest :app:assembleDebug 2>&1 | \
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          fi

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print | sort | head -n 1
          )"

          if [ -z "${APK_FILE:-}" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK file was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/dist"
          mkdir -p "$OUTPUT_DIR"

          APK_OUTPUT="$OUTPUT_DIR/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$APK_OUTPUT"

          unzip -l "$APK_OUTPUT" | tee "$OUTPUT_DIR/native-libraries.txt"
          if ! unzip -Z1 "$APK_OUTPUT" | \
               grep -Eq '^lib/arm64-v8a/.*zstd.*\.so$'; then
            echo "::error::The arm64-v8a Zstandard native library is missing from the APK."
            exit 1
          fi

          sha256sum "$APK_OUTPUT" > "$OUTPUT_DIR/SHA256SUMS.txt"
          {
            echo "Version: 1.4.1"
            echo "Commit: $GITHUB_SHA"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Run attempt: $GITHUB_RUN_ATTEMPT"
            echo "Project directory: $PROJECT_DIR"
            echo "Java: $(java -version 2>&1 | head -n 1)"
            echo "Gradle: $(gradle --version | awk '/Gradle / {print $2; exit}')"
          } > "$OUTPUT_DIR/BUILD_INFO.txt"

          TEST_REPORT="$PROJECT_DIR/app/build/reports/tests/testDebugUnitTest"
          if [ -d "$TEST_REPORT" ]; then
            cp -R "$TEST_REPORT" "$OUTPUT_DIR/unit-test-report"
          fi

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          ls -lh "$OUTPUT_DIR"

      - name: Upload APK and reports
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Build-Failure
          path: |
            gradle-build.log
            **/app/build/reports/tests/testDebugUnitTest/**
            **/app/build/test-results/testDebugUnitTest/**
          if-no-files-found: ignore
          compression-level: 6
          retention-days: 14
