name: Build GTAV Runtime Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android 36
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Auto-fix project before build
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path(".")

          # -----------------------------
          # Remove duplicated permissions
          # -----------------------------
          for manifest in root.rglob("AndroidManifest.xml"):
              txt = manifest.read_text(encoding="utf-8", errors="ignore")

              perms = re.findall(r'<uses-permission[^>]+android:name="([^"]+)"[^>]*/>', txt)

              seen = set()
              def repl(m):
                  p = m.group(1)
                  if p in seen:
                      return ""
                  seen.add(p)
                  return m.group(0)

              txt = re.sub(
                  r'(<uses-permission[^>]+android:name="([^"]+)"[^>]*/>)',
                  repl,
                  txt,
                  flags=re.S
              )

              manifest.write_text(txt, encoding="utf-8")

          # ---------------------------------
          # Java 17 compatibility fixes
          # ---------------------------------
          for java in root.rglob("*.java"):
              txt = java.read_text(encoding="utf-8", errors="ignore")

              txt = txt.replace(
                  "Files.readString(",
                  "new String(Files.readAllBytes("
              )

              txt = txt.replace(
                  "), StandardCharsets.UTF_8)",
                  ").toPath()), StandardCharsets.UTF_8)"
              )

              java.write_text(txt, encoding="utf-8")
          PY

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest --stacktrace --warning-mode all

      - name: Build APK
        run: |
          ./gradlew \
            --no-daemon \
            clean \
            assembleDebug \
            --stacktrace \
            --warning-mode all

      - name: Validate APK
        run: |
          APK=$(find . -path "*debug*.apk" | head -n 1)

          test -f "$APK"

          unzip -l "$APK" | grep "lib/arm64-v8a"

          unzip -l "$APK" | grep -i zstd || true

          sha256sum "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1
          path: |
            **/*debug*.apk

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Diagnostics
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/logs/**          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1 and cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-cleanup: on-success

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Run unit tests and build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:testDebugUnitTest :app:assembleDebug 2>&1 | \
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:testDebugUnitTest :app:assembleDebug 2>&1 | \
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          fi

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print | sort | head -n 1
          )"

          if [ -z "${APK_FILE:-}" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK file was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/dist"
          mkdir -p "$OUTPUT_DIR"

          APK_OUTPUT="$OUTPUT_DIR/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$APK_OUTPUT"

          unzip -l "$APK_OUTPUT" | tee "$OUTPUT_DIR/native-libraries.txt"
          if ! unzip -Z1 "$APK_OUTPUT" | \
               grep -Eq '^lib/arm64-v8a/.*zstd.*\.so$'; then
            echo "::error::The arm64-v8a Zstandard native library is missing from the APK."
            exit 1
          fi

          sha256sum "$APK_OUTPUT" > "$OUTPUT_DIR/SHA256SUMS.txt"
          {
            echo "Version: 1.4.1"
            echo "Commit: $GITHUB_SHA"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Run attempt: $GITHUB_RUN_ATTEMPT"
            echo "Project directory: $PROJECT_DIR"
            echo "Java: $(java -version 2>&1 | head -n 1)"
            echo "Gradle: $(gradle --version | awk '/Gradle / {print $2; exit}')"
          } > "$OUTPUT_DIR/BUILD_INFO.txt"

          TEST_REPORT="$PROJECT_DIR/app/build/reports/tests/testDebugUnitTest"
          if [ -d "$TEST_REPORT" ]; then
            cp -R "$TEST_REPORT" "$OUTPUT_DIR/unit-test-report"
          fi

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          ls -lh "$OUTPUT_DIR"

      - name: Upload APK and reports
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Build-Failure
          path: |
            gradle-build.log
            **/app/build/reports/tests/testDebugUnitTest/**
            **/app/build/test-results/testDebugUnitTest/**
          if-no-files-found: ignore
          compression-level: 6
          retention-days: 14
