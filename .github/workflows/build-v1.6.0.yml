name: Build and Validate GTAV Runtime Manager v1.6.0

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "GTAV_Runtime_Manager_v1.6.0_Unified_Hardened_Source.zip"
      - "**/*.java"
      - "**/*.kt"
      - "**/*.kts"
      - "**/*.xml"
      - "**/*.pro"
      - "**/*.properties"
      - "**/*.sh"
      - ".github/workflows/build-v1.6.0.yml"

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-v1-6-0-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  GRADLE_VERSION: "8.11.1"
  ANDROID_PLATFORM: "android-36"
  ANDROID_BUILD_TOOLS: "35.0.0"
  SOURCE_ZIP_NAME: "GTAV_Runtime_Manager_v1.6.0_Unified_Hardened_Source.zip"

jobs:
  build:
    name: Build, test and validate v1.6.0
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate or extract Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_ROOT="$RUNNER_TEMP/gtav-runtime-manager-v1.6.0"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.git/*" \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print | sort | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            SOURCE_ZIP="$GITHUB_WORKSPACE/$SOURCE_ZIP_NAME"

            if [ ! -f "$SOURCE_ZIP" ]; then
              SOURCE_ZIP="$(
                find "$GITHUB_WORKSPACE" \
                  -maxdepth 6 \
                  -type f \
                  -iname "*v1.6.0*Unified*Hardened*Source*.zip" \
                  -print | sort | head -n 1
              )"
            fi

            if [ -z "${SOURCE_ZIP:-}" ] || [ ! -f "$SOURCE_ZIP" ]; then
              echo "::error::لم يتم العثور على مشروع Android مفكوك أو على ملف $SOURCE_ZIP_NAME."
              find "$GITHUB_WORKSPACE" -maxdepth 6 -type f -not -path "*/.git/*" | sort
              exit 1
            fi

            echo "Extracting source archive: $SOURCE_ZIP"
            unzip -q "$SOURCE_ZIP" -d "$EXTRACT_ROOT"

            SETTINGS_FILE="$(
              find "$EXTRACT_ROOT" \
                -type f \
                \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
                -not -path "*/.gradle/*" \
                -not -path "*/build/*" \
                -print | sort | head -n 1
            )"
          fi

          if [ -z "${SETTINGS_FILE:-}" ] || [ ! -f "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle أو settings.gradle.kts غير موجود."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          REQUIRED_FILES=(
            "$PROJECT_DIR/settings.gradle.kts"
            "$PROJECT_DIR/build.gradle.kts"
            "$PROJECT_DIR/gradle.properties"
            "$PROJECT_DIR/app/build.gradle.kts"
            "$PROJECT_DIR/app/src/main/AndroidManifest.xml"
            "$PROJECT_DIR/tools/verify-source-boundaries.sh"
            "$PROJECT_DIR/validate-release.sh"
          )

          for required in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$required" ]; then
              echo "::error::ملف مشروع إلزامي مفقود: $required"
              exit 1
            fi
          done

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project directory: $PROJECT_DIR"

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-cleanup: on-success

      - name: Print build environment
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Java:"
            java -version
            echo
            echo "Gradle:"
            gradle --version
            echo
            echo "Android SDK root: ${ANDROID_SDK_ROOT:-${ANDROID_HOME:-unset}}"
            echo "Installed platform:"
            sdkmanager --list_installed | grep -E "platforms;android-36|build-tools;35.0.0|platform-tools" || true
          } 2>&1 | tee "$GITHUB_WORKSPACE/BUILD_ENVIRONMENT.txt"

      - name: Validate project structure and source boundaries
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x tools/verify-source-boundaries.sh validate-release.sh
          ./tools/verify-source-boundaries.sh

      - name: Validate Gradle project model
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            projects \
            2>&1 | tee "$GITHUB_WORKSPACE/GRADLE_PROJECTS.txt"

      - name: Resolve and record Zstandard dependencies
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          {
            echo "===== Debug runtime classpath ====="
            gradle \
              --no-daemon \
              --console=plain \
              :app:dependencyInsight \
              --dependency zstd-jni \
              --configuration debugRuntimeClasspath

            echo
            echo "===== Release runtime classpath ====="
            gradle \
              --no-daemon \
              --console=plain \
              :app:dependencyInsight \
              --dependency zstd-jni \
              --configuration releaseRuntimeClasspath
          } 2>&1 | tee "$GITHUB_WORKSPACE/ZSTD_DEPENDENCY_REPORT.txt"

      - name: Verify resolved Zstandard Android AAR
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            :app:verifyZstdAarContents \
            2>&1 | tee "$GITHUB_WORKSPACE/VERIFY_ZSTD_AAR.txt"

      - name: Run JVM unit tests
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            :app:testDebugUnitTest \
            2>&1 | tee "$GITHUB_WORKSPACE/UNIT_TESTS.txt"

      - name: Run Android Lint
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            :app:lintDebug \
            2>&1 | tee "$GITHUB_WORKSPACE/LINT_DEBUG.txt"

      - name: Build and validate Debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            :app:verifyDebugNativePackaging \
            2>&1 | tee "$GITHUB_WORKSPACE/BUILD_DEBUG.txt"

      - name: Build and validate Release APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --console=plain \
            --stacktrace \
            :app:verifyReleaseNativePackaging \
            2>&1 | tee "$GITHUB_WORKSPACE/BUILD_RELEASE.txt"

      - name: Collect APKs and validation reports
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          DIST="$GITHUB_WORKSPACE/dist"
          rm -rf "$DIST"
          mkdir -p \
            "$DIST/apks/debug" \
            "$DIST/apks/release" \
            "$DIST/native-packaging" \
            "$DIST/tests" \
            "$DIST/lint" \
            "$DIST/logs"

          find "$PROJECT_DIR/app/build/outputs/apk/debug" \
            -type f -name "*.apk" \
            -exec cp -v {} "$DIST/apks/debug/" \;

          find "$PROJECT_DIR/app/build/outputs/apk/release" \
            -type f -name "*.apk" \
            -exec cp -v {} "$DIST/apks/release/" \;

          if ! find "$DIST/apks/debug" -type f -name "*.apk" -print -quit | grep -q .; then
            echo "::error::Debug APK غير موجود بعد نجاح البناء."
            exit 1
          fi

          if ! find "$DIST/apks/release" -type f -name "*.apk" -print -quit | grep -q .; then
            echo "::error::Release APK غير موجود بعد نجاح البناء."
            exit 1
          fi

          if [ -d "$PROJECT_DIR/app/build/reports/native-packaging" ]; then
            cp -R "$PROJECT_DIR/app/build/reports/native-packaging/." "$DIST/native-packaging/"
          fi

          if [ -d "$PROJECT_DIR/app/build/reports/tests" ]; then
            cp -R "$PROJECT_DIR/app/build/reports/tests/." "$DIST/tests/"
          fi

          if [ -d "$PROJECT_DIR/app/build/test-results" ]; then
            cp -R "$PROJECT_DIR/app/build/test-results" "$DIST/tests/raw-results"
          fi

          if [ -d "$PROJECT_DIR/app/build/reports/lint-results-debug.html" ]; then
            cp "$PROJECT_DIR/app/build/reports/lint-results-debug.html" "$DIST/lint/" || true
          fi

          find "$PROJECT_DIR/app/build/reports" \
            -maxdepth 1 \
            -type f \
            \( -name "lint-results-*" -o -name "lint-report-*" \) \
            -exec cp -v {} "$DIST/lint/" \; || true

          cp "$GITHUB_WORKSPACE/BUILD_ENVIRONMENT.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/GRADLE_PROJECTS.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/ZSTD_DEPENDENCY_REPORT.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/VERIFY_ZSTD_AAR.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/UNIT_TESTS.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/LINT_DEBUG.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/BUILD_DEBUG.txt" "$DIST/logs/"
          cp "$GITHUB_WORKSPACE/BUILD_RELEASE.txt" "$DIST/logs/"

          find "$DIST/apks" -type f -name "*.apk" -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > "$DIST/SHA256SUMS_ALL_APKS.txt"

          {
            echo "Application: GTAV Runtime Manager"
            echo "Version: 1.6.0"
            echo "Commit: $GITHUB_SHA"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Run attempt: $GITHUB_RUN_ATTEMPT"
            echo "Java: $JAVA_VERSION"
            echo "Gradle: $GRADLE_VERSION"
            echo "Android platform: $ANDROID_PLATFORM"
            echo "Android build tools: $ANDROID_BUILD_TOOLS"
            echo
            echo "Generated APKs:"
            find "$DIST/apks" -type f -name "*.apk" -printf " - %P\n" | sort
          } > "$DIST/CI_BUILD_INFO.txt"

          echo "dist_dir=$DIST" >> "$GITHUB_OUTPUT"
          find "$DIST" -maxdepth 5 -type f -printf "%P\n" | sort

      - name: Final APK native-library inspection
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r apk; do
            echo "Inspecting: $apk"
            CONTENTS_FILE="${apk%.apk}.contents.txt"
            unzip -Z1 "$apk" | sort > "$CONTENTS_FILE"

            echo "Native libraries:"
            grep '^lib/' "$CONTENTS_FILE" || true

            if ! grep -Eq '^lib/arm64-v8a/[^/]*zstd[^/]*\.so$' "$CONTENTS_FILE"; then
              echo "::error::BUILD FAILED: ZSTD_NOT_PACKAGED in $(basename "$apk")"
              exit 1
            fi
          done < <(find "${{ steps.artifacts.outputs.dist_dir }}/apks" -type f -name "*.apk" | sort)

      - name: Upload validated APKs and reports
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.6.0-Validated
          path: ${{ steps.artifacts.outputs.dist_dir }}/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload diagnostics if the job fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.6.0-Build-Failure
          path: |
            BUILD_ENVIRONMENT.txt
            GRADLE_PROJECTS.txt
            ZSTD_DEPENDENCY_REPORT.txt
            VERIFY_ZSTD_AAR.txt
            UNIT_TESTS.txt
            LINT_DEBUG.txt
            BUILD_DEBUG.txt
            BUILD_RELEASE.txt
            **/app/build/reports/**
            **/app/build/test-results/**
            **/app/build/outputs/logs/**
          if-no-files-found: ignore
          compression-level: 6
          retention-days: 14

      - name: Complete job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# GTAV Runtime Manager v1.6.0"
            echo
            echo "- Job status: **${{ job.status }}**"
            echo "- Java: **$JAVA_VERSION**"
            echo "- Gradle: **$GRADLE_VERSION**"
            echo "- Android platform: **$ANDROID_PLATFORM**"
            echo "- Build tools: **$ANDROID_BUILD_TOOLS**"
            echo
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ Unit tests, Lint, Debug APK, Release APK, AAR validation and native packaging validation completed successfully."
              echo
              echo "ملاحظة: اختبارات Android Instrumented التي تثبت JNI فعليًا تحتاج جهاز ARM64، ولذلك لا تعمل على GitHub runner العادي."
            else
              echo "❌ فشلت إحدى بوابات البناء. حمّل Artifact التشخيص لرؤية السجل الكامل."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
