name: Build and validate v1.6.0

"on":
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Verify source boundaries
        run: ./tools/verify-source-boundaries.sh

      - name: Unit tests, lint, APKs and native packaging gates
        run: gradle --no-daemon clean testDebugUnitTest lintDebug validateAllNativePackaging

      - name: Upload APKs and validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.6.0
          if-no-files-found: error
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/reports/native-packaging/**
            app/build/reports/tests/**
            app/build/reports/lint-results-debug.*
