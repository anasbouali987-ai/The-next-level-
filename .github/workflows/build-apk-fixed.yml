name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master]

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_FILE="$(
            find "$GITHUB_WORKSPACE" -maxdepth 5 -type f \
              \( -name settings.gradle -o -name settings.gradle.kts \) \
              -not -path '*/.gradle/*' \
              -printf '%d %p\n' \
              | sort -n \
              | head -n 1 \
              | cut -d' ' -f2-
          )"

          if [ -z "$PROJECT_FILE" ]; then
            echo "::error::لم يتم العثور على settings.gradle أو settings.gradle.kts داخل المستودع."
            echo "محتويات جذر المستودع:"
            find "$GITHUB_WORKSPACE" -maxdepth 3 -mindepth 1 -print | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "تم العثور على مشروع Android في: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build debug and release APKs
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon --stacktrace assembleDebug assembleRelease
          else
            gradle --no-daemon --stacktrace assembleDebug assembleRelease
          fi

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          DEBUG_APK="$(find . -type f -path '*/build/outputs/apk/debug/*.apk' | head -n 1)"
          RELEASE_APK="$(find . -type f -path '*/build/outputs/apk/release/*.apk' | head -n 1)"

          if [ -z "$DEBUG_APK" ]; then
            echo "::error::لم يتم العثور على ملف Debug APK بعد البناء."
            find . -type f -path '*/build/outputs/*' -print || true
            exit 1
          fi

          cp "$DEBUG_APK" \
            "$GITHUB_WORKSPACE/artifacts/GTAV-Runtime-Inspector-v1.1.0-debug.apk"

          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" \
              "$GITHUB_WORKSPACE/artifacts/GTAV-Runtime-Inspector-v1.1.0-release-unsigned.apk"
          fi

          cd "$GITHUB_WORKSPACE/artifacts"
          sha256sum ./*.apk > SHA256SUMS.txt
          ls -lh

      - name: Upload installable debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Inspector-Debug-APK
          path: |
            artifacts/GTAV-Runtime-Inspector-v1.1.0-debug.apk
            artifacts/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Inspector-Release-Unsigned
          path: artifacts/GTAV-Runtime-Inspector-v1.1.0-release-unsigned.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
