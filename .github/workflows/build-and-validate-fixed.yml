name: Build and validate v1.6.0

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t roots < <(
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f \
              \( -name settings.gradle.kts -o -name settings.gradle \) \
              -not -path '*/.git/*' \
              -printf '%h\n' | sort -u
          )

          if [[ ${#roots[@]} -eq 0 ]]; then
            echo "No Android Gradle project was found." >&2
            find "$GITHUB_WORKSPACE" -maxdepth 3 -type f | sort
            exit 1
          fi

          if [[ ${#roots[@]} -gt 1 ]]; then
            echo "Multiple Android projects were found:" >&2
            printf ' - %s\n' "${roots[@]}" >&2
            exit 1
          fi

          project_dir="${roots[0]}"
          echo "PROJECT_DIR=$project_dir" >> "$GITHUB_ENV"
          echo "Android project: $project_dir"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Verify source boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [[ -f tools/verify-source-boundaries.sh ]]; then
            chmod +x tools/verify-source-boundaries.sh
            ./tools/verify-source-boundaries.sh
          else
            echo "tools/verify-source-boundaries.sh is absent; using the Gradle boundary gate."
            gradle --no-daemon :app:verifyNoDirectZstdUsage
          fi

      - name: Unit tests, lint, APKs and native packaging gates
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          gradle --no-daemon --stacktrace \
            clean \
            testDebugUnitTest \
            lintDebug \
            validateAllNativePackaging

      - name: Upload APKs and validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.6.0-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/**/*.apk
            ${{ env.PROJECT_DIR }}/app/build/reports/native-packaging/**
            ${{ env.PROJECT_DIR }}/app/build/reports/tests/**
            ${{ env.PROJECT_DIR }}/app/build/reports/lint-results-*
