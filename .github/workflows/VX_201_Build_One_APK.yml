name: Build VX 201 - Single APK

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: "Run a clean build"
        required: false
        type: boolean
        default: false
      verbose_logs:
        description: "Enable verbose shell logs"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "VX_201_Runtime_Picker_Source.zip"
      - "VX_201_Source.zip"
      - ".github/workflows/main.yml"

permissions:
  contents: read

concurrency:
  group: vx-201-single-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_PLATFORM: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  CMAKE_VERSION: "3.22.1"
  GRADLE_VERSION: "8.10.2"
  JAVA_VERSION: "17"
  VERBOSE_LOGS: ${{ github.event_name == 'workflow_dispatch' && inputs.verbose_logs && '1' || '0' }}

jobs:
  build:
    name: Build one installable VX 201 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Locate and extract VX 201 source
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x

          mapfile -t zips < <(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f \
            \( -name 'VX_201_Runtime_Picker_Source.zip' -o -name 'VX_201_Source.zip' -o -name 'VX_201*.zip' \) \
            -size +0c | sort)

          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "::error::No VX 201 source ZIP was found in the repository root."
            exit 1
          fi

          SOURCE_ZIP="${zips[0]}"
          unzip -t "$SOURCE_ZIP"
          sha256sum "$SOURCE_ZIP"

          EXTRACT_DIR="$RUNNER_TEMP/vx201-source"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "$SOURCE_ZIP" -d "$EXTRACT_DIR"

          mapfile -t roots < <(
            find "$EXTRACT_DIR" -type f \( -name settings.gradle.kts -o -name settings.gradle \) -print0 \
              | xargs -0 -r -n1 dirname \
              | while IFS= read -r root; do
                  [[ -f "$root/app/build.gradle.kts" || -f "$root/app/build.gradle" ]] || continue
                  [[ -f "$root/app/src/main/AndroidManifest.xml" ]] || continue
                  printf '%s\n' "$root"
                done | sort -u
          )

          if [[ ${#roots[@]} -ne 1 ]]; then
            echo "::error::Expected one Android project root, found ${#roots[@]}."
            printf '%s\n' "${roots[@]:-<none>}"
            exit 1
          fi

          PROJECT_DIR="${roots[0]}"
          echo "SOURCE_ZIP=$SOURCE_ZIP" >> "$GITHUB_ENV"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Detected project: $PROJECT_DIR"

      - name: Validate application and runtime picker
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x
          cd "$PROJECT_DIR"

          required=(
            settings.gradle.kts
            build.gradle.kts
            gradle.properties
            app/build.gradle.kts
            app/src/main/AndroidManifest.xml
            app/src/main/java/com/vx/runtime/MainActivity.java
            app/src/main/java/com/vx/runtime/RuntimeInstaller.kt
            app/src/main/java/com/vx/runtime/RuntimeStore.kt
            app/src/main/java/com/vx/runtime/RuntimeImportBridge.kt
            app/src/main/cpp/CMakeLists.txt
            app/src/main/cpp/vx_diagnostic.cpp
            app/src/main/cpp/native_probe.c
            probes.c
          )
          for file in "${required[@]}"; do
            [[ -s "$file" ]] || { echo "::error file=$file::Missing required file"; exit 1; }
          done

          grep -Fq 'applicationId = "com.vx.runtime"' app/build.gradle.kts
          grep -Fq 'versionCode = 203' app/build.gradle.kts
          grep -Fq 'android:label="VX 201"' app/src/main/AndroidManifest.xml
          grep -Fq 'ACTION_OPEN_DOCUMENT' app/src/main/java/com/vx/runtime/MainActivity.java
          grep -Fq 'RuntimeImportBridge.install' app/src/main/java/com/vx/runtime/MainActivity.java
          grep -Fq 'rootfs.tar.zst' app/src/main/java/com/vx/runtime/RuntimeInstaller.kt
          grep -Fq 'runtime_manifest.json' app/src/main/java/com/vx/runtime/RuntimeInstaller.kt
          grep -Fq 'pipe2' app/src/main/cpp/vx_diagnostic.cpp
          grep -Fq 'waitpid' app/src/main/cpp/vx_diagnostic.cpp

          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          for path in (
              'app/src/main/AndroidManifest.xml',
              'app/src/main/res/layout/activity_main.xml',
              'app/src/main/res/values/strings.xml',
              'app/src/main/res/values/styles.xml',
              'app/src/main/res/xml/file_paths.xml',
          ):
              ET.parse(path)
              print('XML OK:', path)
          PY

          gcc -std=c11 -Wall -Wextra -Werror -fsyntax-only probes.c
          gcc -std=c11 -Wall -Wextra -Werror -fsyntax-only app/src/main/cpp/native_probe.c

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android and cross-compilation tools
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x

          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils file gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu \
            libc6-dev-arm64-cross unzip zip

          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          test -x "$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_build }}

      - name: Preserve one debug signing key across builds
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: vx201-debug-keystore-v1

      - name: Create debug signing key when absent
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.android"
          if [[ ! -s "$HOME/.android/debug.keystore" ]]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=VX 201 Debug,O=VX,C=US"
          fi
          keytool -list -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey

      - name: Build diagnostic probes
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x
          cd "$PROJECT_DIR"

          ASSETS="app/src/main/assets/diagnostic"
          JNI="app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$ASSETS" "$JNI"
          rm -f "$ASSETS/hello_static" "$ASSETS/hello_dynamic_glibc" "$ASSETS/hello_x86_64" "$JNI/libvxnativeprobe.so"

          aarch64-linux-gnu-gcc -O2 -static -s -Wall -Wextra -Werror \
            -DPROBE_TEXT='"VX201_LINUX_STATIC_OK\\n"' probes.c -o "$ASSETS/hello_static"

          aarch64-linux-gnu-gcc -O2 -s -Wall -Wextra -Werror \
            -DPROBE_TEXT='"VX201_GLIBC_DYNAMIC_OK\\n"' probes.c -o "$ASSETS/hello_dynamic_glibc"

          x86_64-linux-gnu-gcc -O2 -static -s -Wall -Wextra -Werror \
            -DPROBE_TEXT='"VX201_X86_64_OK\\n"' probes.c -o "$ASSETS/hello_x86_64"

          "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang" \
            -O2 -fPIE -pie -s -Wall -Wextra -Werror \
            app/src/main/cpp/native_probe.c -o "$JNI/libvxnativeprobe.so"

          chmod 0755 "$ASSETS/hello_static" "$ASSETS/hello_dynamic_glibc" "$ASSETS/hello_x86_64" "$JNI/libvxnativeprobe.so"

          readelf -h "$ASSETS/hello_static" | grep -Eq 'Machine:[[:space:]]+AArch64'
          readelf -l "$ASSETS/hello_static" | grep -qv 'Requesting program interpreter'
          readelf -h "$ASSETS/hello_dynamic_glibc" | grep -Eq 'Machine:[[:space:]]+AArch64'
          readelf -l "$ASSETS/hello_dynamic_glibc" | grep -q 'Requesting program interpreter'
          readelf -h "$ASSETS/hello_x86_64" | grep -Eq 'Machine:[[:space:]]+Advanced Micro Devices X86-64'
          readelf -h "$JNI/libvxnativeprobe.so" | grep -Eq 'Machine:[[:space:]]+AArch64'

      - name: Build the single APK
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x
          cd "$PROJECT_DIR"

          args=(--no-daemon --stacktrace)
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.clean_build }}" == "true" ]]; then
            args+=(--no-build-cache --rerun-tasks clean)
          fi
          gradle "${args[@]}" :app:assembleDebug

          APK="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*-debug.apk' -size +0c | head -1)"
          [[ -n "$APK" && -s "$APK" ]] || { echo "::error::Debug APK was not produced"; exit 1; }
          echo "BUILT_APK=$PROJECT_DIR/$APK" >> "$GITHUB_ENV"

      - name: Verify and prepare exactly one APK
        run: |
          set -Eeuo pipefail
          [[ "$VERBOSE_LOGS" == "1" ]] && set -x

          AAPT="$ANDROID_SDK_ROOT/build-tools/$ANDROID_BUILD_TOOLS/aapt"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$ANDROID_BUILD_TOOLS/apksigner"
          OUTPUT="$RUNNER_TEMP/vx201-single-output"
          rm -rf "$OUTPUT"
          mkdir -p "$OUTPUT"

          cp "$BUILT_APK" "$OUTPUT/VX_201.apk"
          APK="$OUTPUT/VX_201.apk"

          "$APKSIGNER" verify --verbose --print-certs "$APK"
          BADGING="$($AAPT dump badging "$APK")"
          grep -Fq "package: name='com.vx.runtime' versionCode='203'" <<< "$BADGING"
          grep -Fq "application-label:'VX 201'" <<< "$BADGING"

          APK_LIST="$(unzip -Z1 "$APK")"
          required=(
            assets/diagnostic/hello_static
            assets/diagnostic/hello_dynamic_glibc
            assets/diagnostic/hello_x86_64
            lib/arm64-v8a/libvxnativeprobe.so
            lib/arm64-v8a/libvxdiagnostic.so
          )
          for entry in "${required[@]}"; do
            grep -Fxq "$entry" <<< "$APK_LIST" || { echo "::error::Missing APK entry: $entry"; exit 1; }
          done

          sha256sum "$APK"
          echo "FINAL_APK=$APK" >> "$GITHUB_ENV"

          {
            echo "## VX 201 build completed"
            echo
            echo "One installable APK was produced: \`VX_201.apk\`."
            echo "It contains the Runtime file picker and diagnostic probes."
            echo
            echo "SHA-256: \`$(sha256sum "$APK" | awk '{print $1}')\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload one application only
        uses: actions/upload-artifact@v4
        with:
          name: VX-201-${{ github.run_number }}
          path: ${{ env.FINAL_APK }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
