name: Build GTAV Runtime Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate or extract project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_DIR="$RUNNER_TEMP/gtav-source"
          mkdir -p "$EXTRACT_DIR"

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.git/*" \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print | sort | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            ZIP_FILE="$(
              find "$GITHUB_WORKSPACE" \
                -maxdepth 3 \
                -type f \
                -iname "*.zip" \
                -not -path "*/.git/*" \
                -print | sort | head -n 1
            )"

            test -n "${ZIP_FILE:-}" || {
              echo "::error::لم يتم العثور على مشروع Android أو ملف ZIP."
              exit 1
            }

            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            SETTINGS_FILE="$(
              find "$EXTRACT_DIR" \
                -type f \
                \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
                -not -path "*/.gradle/*" \
                -not -path "*/build/*" \
                -print | sort | head -n 1
            )"
          fi

          test -n "${SETTINGS_FILE:-}" || {
            echo "::error::لم يتم العثور على settings.gradle."
            exit 1
          }

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          test -d "$PROJECT_DIR/app" || {
            echo "::error::مجلد app غير موجود."
            exit 1
          }

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply Android compatibility fixes
        shell: bash
        run: |
          set -euo pipefail

          APP_GRADLE=""
          if [ -f "$PROJECT_DIR/app/build.gradle.kts" ]; then
            APP_GRADLE="$PROJECT_DIR/app/build.gradle.kts"
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[0-9]+/compileSdk = 35/' "$APP_GRADLE"
            sed -i -E 's/targetSdk[[:space:]]*=[[:space:]]*[0-9]+/targetSdk = 35/' "$APP_GRADLE"
          elif [ -f "$PROJECT_DIR/app/build.gradle" ]; then
            APP_GRADLE="$PROJECT_DIR/app/build.gradle"
            sed -i -E 's/compileSdk(Version)?[[:space:]]+[0-9]+/compileSdkVersion 35/' "$APP_GRADLE"
            sed -i -E 's/targetSdk(Version)?[[:space:]]+[0-9]+/targetSdkVersion 35/' "$APP_GRADLE"
          fi

          # إزالة المحارف التي قد تسبب فشل AAPT2 في بعض البيئات.
          find "$PROJECT_DIR/app/src/main/res" -type f -name "*.xml" -print0 |
          while IFS= read -r -d '' file; do
            python3 - "$file" <<'PY'
          import pathlib, sys
          p = pathlib.Path(sys.argv[1])
          s = p.read_text(encoding="utf-8")
          s = s.replace("✅", "").replace("❌", "").replace("⚠️", "")
          s = s.replace("—", "-")
          p.write_text(s, encoding="utf-8")
          PY
          done

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:assembleDebug 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:assembleDebug 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          fi

      - name: Collect APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f -name "*.apk" -print | sort | head -n 1
          )"

          test -f "$APK" || {
            echo "::error::لم يتم العثور على APK."
            exit 1
          }

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$APK" "$GITHUB_WORKSPACE/dist/GTAV-Runtime-Manager-debug.apk"
          sha256sum "$GITHUB_WORKSPACE/dist/GTAV-Runtime-Manager-debug.apk" \
            > "$GITHUB_WORKSPACE/dist/SHA256SUMS.txt"

          echo "dist=$GITHUB_WORKSPACE/dist" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-APK
          path: ${{ steps.apk.outputs.dist }}/*
          if-no-files-found: error
          compression-level: 0

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-Build-Log
          path: gradle-build.log
          if-no-files-found: ignore
