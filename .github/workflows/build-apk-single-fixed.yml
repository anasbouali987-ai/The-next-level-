name: Build Android APK

# تشغيل يدوي فقط لتجنب تشغيل أكثر من Workflow عند كل رفع.
# احذف أو عطّل أي ملفات YAML قديمة داخل .github/workflows.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-build
  cancel-in-progress: true

jobs:
  build:
    name: Build one APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print \
            | sort \
            | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            echo "::error::لم يتم العثور على settings.gradle.kts أو settings.gradle داخل المستودع."
            echo "محتويات المستودع:"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app" ]; then
            echo "::error::تم العثور على مشروع Gradle، لكن مجلد app غير موجود: $PROJECT_DIR"
            find "$PROJECT_DIR" -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project: $PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle
            **/*.gradle.kts
            **/gradle-wrapper.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon --stacktrace clean :app:assembleDebug
          else
            gradle --no-daemon --stacktrace clean :app:assembleDebug
          fi

      - name: Collect one APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.project.outputs.project_dir }}"
          APK_FILE="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print \
            | sort \
            | head -n 1
          )"

          if [ -z "${APK_FILE:-}" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::اكتمل Gradle دون العثور على APK داخل app/build/outputs/apk/debug."
            find "$PROJECT_DIR/app/build/outputs" -type f 2>/dev/null | sort || true
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/apk-output"
          mkdir -p "$OUTPUT_DIR"
          cp "$APK_FILE" "$OUTPUT_DIR/GTAV-Runtime-Inspector-debug.apk"

          echo "apk_path=$OUTPUT_DIR/GTAV-Runtime-Inspector-debug.apk" >> "$GITHUB_OUTPUT"
          ls -lh "$OUTPUT_DIR"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Inspector-APK
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
