name: Build GTAV Runtime Manager v1.7 Experiment 4 — FIXED v8
run-name: GTAV v1.7 Exp4 — fixed-v8 — ${{ github.ref_name }}

"on":
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-v17-exp4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      WORKFLOW_REVISION: fixed-v8-aapt-safe-execution-assets
      TERMUX_PACKAGES_REF_INPUT: ${{ vars.TERMUX_PACKAGES_COMMIT }}
      DEFAULT_TERMUX_PACKAGES_REF: 17c04d8e63e4744a91590854cac9ee44f143e5e2
      EXPECTED_PROOT_VERSION: 5.1.107.84
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Confirm workflow revision and prepare diagnostics
        shell: bash
        run: |
          set -euo pipefail
          [[ "$WORKFLOW_REVISION" == "fixed-v8-aapt-safe-execution-assets" ]]
          mkdir -p artifacts/reports/system apk-inspection
          : > gradle-build.log
          : > execution-components-build.log
          printf '%s\n' "$WORKFLOW_REVISION" > artifacts/reports/WORKFLOW_REVISION.txt
          echo 'FIXED_WORKFLOW_V8_CONFIRMED'

      - name: Locate and extract ZIP source archive
        shell: bash
        run: |
          set -euo pipefail

          archive="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -iname '*.zip' -print -quit)"
          [[ -n "$archive" ]] || {
            echo 'ERROR: no ZIP archive was found in the repository root.' >&2
            exit 1
          }

          echo "Using ZIP archive: $(basename "$archive")"
          rm -rf "$GITHUB_WORKSPACE/extracted-source"
          mkdir -p "$GITHUB_WORKSPACE/extracted-source"
          unzip -q "$archive" -d "$GITHUB_WORKSPACE/extracted-source"

          project="$(find "$GITHUB_WORKSPACE/extracted-source" -maxdepth 8 -type f \
            \( -name settings.gradle -o -name settings.gradle.kts \) \
            -printf '%h\n' -quit)"
          [[ -n "$project" ]] || {
            echo 'ERROR: the ZIP does not contain a Gradle project.' >&2
            exit 1
          }

          project="$(realpath "$project")"
          workspace="$(realpath "$GITHUB_WORKSPACE")"
          project_rel="${project#"$workspace"/}"
          echo "PROJECT_DIR=$project_rel" >> "$GITHUB_ENV"
          echo "PROJECT_DIR=$project_rel"

      - name: Install host validation and build tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            ca-certificates \
            curl \
            dpkg-dev \
            file \
            g++ \
            gcc \
            gcc-x86-64-linux-gnu \
            git \
            jq \
            python3 \
            tar \
            unzip \
            xz-utils \
            zip

      - name: Validate source files
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(find . -type f -name '*.sh' -print0)

          if [[ -f tools/test_termux_properties_patch.py ]]; then
            (cd tools && PYTHONDONTWRITEBYTECODE=1 python3 -B test_termux_properties_patch.py)
          fi

          if [[ -f execution-components/HELLO_X86_64_SHA256.txt ]]; then
            sha256sum --check --strict execution-components/HELLO_X86_64_SHA256.txt
          fi

      - name: Source and execution architecture checks
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          bash tools/verify-source-boundaries.sh
          bash tools/verify-execution-architecture.sh

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          check-latest: false

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'platforms;android-36' \
            'build-tools;35.0.0'

      - name: Resolve pinned Termux source revision
        id: termux
        shell: bash
        run: |
          set -euo pipefail
          ref="${TERMUX_PACKAGES_REF_INPUT:-$DEFAULT_TERMUX_PACKAGES_REF}"
          [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo 'ERROR: TERMUX_PACKAGES_COMMIT must be a full 40-character commit SHA.' >&2
            exit 1
          }
          script_sha="$(sha256sum "$PROJECT_DIR/tools/provision-execution-components.sh" | awk '{print $1}')"
          echo "TERMUX_PACKAGES_REF=$ref" >> "$GITHUB_ENV"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "script_sha=$script_sha" >> "$GITHUB_OUTPUT"
          echo "Pinned termux-packages commit: $ref"
          echo "Expected PRoot version: $EXPECTED_PROOT_VERSION"
          echo "Provision script SHA-256: $script_sha"

      - name: Cache custom-prefix PRoot build
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.PROJECT_DIR }}/.termux-packages/.termux-build
            ${{ env.PROJECT_DIR }}/.termux-packages/output
          key: proot-${{ runner.os }}-${{ steps.termux.outputs.ref }}-${{ steps.termux.outputs.script_sha }}

      - name: Provision Android ARM64 PRoot and x86_64 smoke ELF
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        env:
          PROOT_COMPONENT_BUNDLE_URL: ${{ secrets.PROOT_COMPONENT_BUNDLE_URL }}
          PROOT_COMPONENT_BUNDLE_SHA256: ${{ secrets.PROOT_COMPONENT_BUNDLE_SHA256 }}
        run: |
          set -euo pipefail
          set -o pipefail
          bash tools/provision-execution-components.sh 2>&1 | \
            tee "$GITHUB_WORKSPACE/execution-components-build.log"
          readelf -h app/src/main/assets/execution/usr/bin/proot
          readelf -h app/src/main/assets/execution/usr/libexec/proot/loader
          readelf -h app/src/main/assets/execution/hello-x86_64

      - name: Build, test, lint, and validate Debug and Release
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          if [[ -f ./gradlew ]]; then
            chmod +x ./gradlew
            GRADLE=(./gradlew)
          else
            GRADLE=(gradle)
          fi
          "${GRADLE[@]}" --no-daemon --stacktrace \
            testDebugUnitTest \
            lintDebug \
            assembleDebugAndroidTest \
            validateAllNativePackaging \
            2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Inspect APK execution payloads
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/apk-inspection"
          while IFS= read -r -d '' apk; do
            base="$(basename "$apk")"
            unzip -tq "$apk"
            unzip -l "$apk" > "$GITHUB_WORKSPACE/apk-inspection/${base}.txt"
            {
              echo "--- assets/execution in $base ---"
              unzip -l "$apk" | grep -E \
                'assets/execution/(usr/bin/proot|usr/libexec/proot/loader|hello-x86_64)' || true
              echo "--- lib/arm64-v8a in $base ---"
              unzip -l "$apk" | grep 'lib/arm64-v8a/' || true
            } | tee "$GITHUB_WORKSPACE/apk-inspection/${base}.summary.txt"
          done < <(find app/build/outputs/apk -type f -name '*.apk' -print0 2>/dev/null || true)

      - name: Collect APKs and build reports
        if: success()
        working-directory: ${{ env.PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$OUT/reports"

          debug="$(find app/build/outputs/apk/debug -type f -name '*.apk' -print -quit)"
          release="$(find app/build/outputs/apk/release -type f -name '*.apk' -print -quit)"
          android_test="$(find app/build/outputs/apk/androidTest -type f -name '*.apk' -print -quit 2>/dev/null || true)"
          [[ -n "$debug" && -n "$release" ]] || {
            echo 'ERROR: expected Debug and Release APKs were not produced.' >&2
            exit 1
          }

          cp "$debug" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-debug.apk"
          cp "$release" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-release-unsigned.apk"
          [[ -z "$android_test" ]] || \
            cp "$android_test" "$OUT/GTAV-Runtime-Manager-v1.7.0-exp4-androidTest.apk"

          cp -a app/build/reports/native-packaging "$OUT/reports/" 2>/dev/null || true
          cp -a app/build/reports/execution-components "$OUT/reports/" 2>/dev/null || true
          cp -a execution-components/reports "$OUT/reports/provisioning" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/gradle-build.log" "$OUT/reports/"
          cp "$GITHUB_WORKSPACE/execution-components-build.log" "$OUT/reports/"
          cp -a "$GITHUB_WORKSPACE/apk-inspection" "$OUT/reports/"

          (
            cd "$OUT"
            sha256sum ./*.apk > SHA256SUMS.txt
          )

          {
            echo 'App version: 1.7.0-exp4'
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_RUN_ID"
            echo 'Requested ABI: arm64-v8a'
            echo 'Variants: Debug, Release, androidTest'
            echo 'Execution gates: PRoot, RootFS, Box64, Wine Console'
            echo 'Future backends: Display/Audio/Graphics/Input NOT_IMPLEMENTED'
            echo
            find "$OUT/reports" -type f -printf '%P\n' | sort
          } > "$OUT/BUILD_INFO.txt"

          cp execution-components/reports/EXECUTION_COMPONENTS.txt \
            "$OUT/EXECUTION_COMPONENTS.txt"
          printf '%s\n' \
            'PROOT=REQUESTED' \
            'BOX64=REQUESTED' \
            'WINE=REQUESTED' \
            'DISPLAY=NOT_REQUESTED' \
            'AUDIO=NOT_REQUESTED' \
            'GRAPHICS=NOT_REQUESTED' \
            'DXVK=NOT_REQUESTED' \
            'INPUT=NOT_REQUESTED' \
            'GAME_LIBRARY=NOT_REQUESTED' \
            > "$OUT/FEATURE_FLAGS.txt"

      - name: Collect system diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$GITHUB_WORKSPACE/artifacts/reports/system"
          mkdir -p "$REPORT"
          df -h > "$REPORT/disk-space.txt"
          docker version > "$REPORT/docker-version.txt" 2>&1 || true
          java -version > "$REPORT/java-version.txt" 2>&1 || true
          gradle --version > "$REPORT/gradle-version.txt" 2>&1 || true
          sdkmanager --version > "$REPORT/sdkmanager-version.txt" 2>&1 || true
          git --version > "$REPORT/git-version.txt" 2>&1 || true
          if [[ -n "${PROJECT_DIR:-}" && -d "$PROJECT_DIR" ]]; then
            find "$PROJECT_DIR" -maxdepth 3 -type f -printf '%P\n' | sort \
              > "$REPORT/project-file-list.txt"
          fi

      - name: Upload installable Debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Installable
          path: |
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-debug.apk
            artifacts/SHA256SUMS.txt
            artifacts/BUILD_INFO.txt
            artifacts/EXECUTION_COMPONENTS.txt
            artifacts/FEATURE_FLAGS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload Release and test APKs
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Release-and-Tests
          path: |
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-release-unsigned.apk
            artifacts/GTAV-Runtime-Manager-v1.7.0-exp4-androidTest.apk
            artifacts/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: GTAV-Runtime-Manager-v1.7.0-Experiment4-Build-Reports
          path: |
            artifacts/reports
            gradle-build.log
            execution-components-build.log
            apk-inspection
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
