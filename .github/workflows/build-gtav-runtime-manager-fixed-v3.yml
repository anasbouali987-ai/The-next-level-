name: Build GTAV Runtime Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate or extract Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_DIR="$RUNNER_TEMP/gtav-runtime-manager"
          mkdir -p "$EXTRACT_DIR"

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.git/*" \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print | sort | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            ZIP_FILE="$(
              find "$GITHUB_WORKSPACE" \
                -maxdepth 4 \
                -type f \
                -iname "*.zip" \
                -not -path "*/.git/*" \
                -print | sort | head -n 1
            )"

            if [ -z "${ZIP_FILE:-}" ]; then
              echo "::error::لم يتم العثور على مشروع Android أو ملف ZIP للمصدر."
              exit 1
            fi

            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            SETTINGS_FILE="$(
              find "$EXTRACT_DIR" \
                -type f \
                \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
                -not -path "*/.gradle/*" \
                -not -path "*/build/*" \
                -print | sort | head -n 1
            )"
          fi

          if [ -z "${SETTINGS_FILE:-}" ]; then
            echo "::error::لم يتم العثور على settings.gradle."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app" ]; then
            echo "::error::مجلد app غير موجود داخل المشروع."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply stable Gradle and Android fixes
        shell: bash
        run: |
          set -euo pipefail

          cat > "$PROJECT_DIR/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
          }
          EOF

          python3 - "$PROJECT_DIR/app/build.gradle.kts" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")

          text = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 35', text)
          text = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 35', text)

          text = text.replace(
              'sourceCompatibility = JavaVersion.VERSION_17',
              'sourceCompatibility = JavaVersion.VERSION_11'
          )
          text = text.replace(
              'targetCompatibility = JavaVersion.VERSION_17',
              'targetCompatibility = JavaVersion.VERSION_11'
          )

          text = re.sub(
              r'implementation\("org\.apache\.commons:commons-compress:[^"]+"\)',
              'implementation("org.apache.commons:commons-compress:1.26.2")',
              text
          )
          text = re.sub(
              r'implementation\("com\.github\.luben:zstd-jni:[^"]+"\)',
              'implementation("com.github.luben:zstd-jni:1.5.6-9")',
              text
          )

          if 'coreLibraryDesugaring(' not in text:
              text = text.replace(
                  'dependencies {',
                  'dependencies {\n'
                  '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")'
              )

          marker = 'compileOptions {'
          if marker in text and 'isCoreLibraryDesugaringEnabled' not in text:
              text = text.replace(
                  marker,
                  marker + '\n        isCoreLibraryDesugaringEnabled = true'
              )

          if 'jniLibs {' not in text:
              text = text.replace(
                  'packaging {',
                  'packaging {\n'
                  '        jniLibs {\n'
                  '            useLegacyPackaging = true\n'
                  '        }'
              )

          path.write_text(text, encoding="utf-8")
          PY

          # تجنب استخدام Files.readString لضمان التوافق أثناء D8/desugaring.
          find "$PROJECT_DIR/app/src/main/java" -type f -name "*.java" -print0 |
          while IFS= read -r -d '' file; do
            sed -i \
              's/Files\.readString(\([^,]*\),[[:space:]]*StandardCharsets\.UTF_8)/new String(Files.readAllBytes(\1), StandardCharsets.UTF_8)/g' \
              "$file"
          done

          # إزالة الرموز الزخرفية من XML فقط لتجنب مشاكل AAPT2.
          find "$PROJECT_DIR/app/src/main/res" -type f -name "*.xml" -print0 |
          while IFS= read -r -d '' file; do
            python3 - "$file" <<'PY'
          from pathlib import Path
          import sys
          p = Path(sys.argv[1])
          s = p.read_text(encoding="utf-8")
          for old, new in {
              "✅": "",
              "❌": "",
              "⚠️": "",
              "⚠": "",
              "—": "-",
              "→": "->",
              "…": "..."
          }.items():
              s = s.replace(old, new)
          p.write_text(s, encoding="utf-8")
          PY
          done

          echo "===== app/build.gradle.kts ====="
          cat "$PROJECT_DIR/app/build.gradle.kts"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew \
              --no-daemon \
              --stacktrace \
              --info \
              --console=plain \
              clean :app:assembleDebug 2>&1 |
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --info \
              --console=plain \
              clean :app:assembleDebug 2>&1 |
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          fi

      - name: Collect APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print | sort | head -n 1
          )"

          if [ -z "${APK:-}" ] || [ ! -f "$APK" ]; then
            echo "::error::لم يتم العثور على APK."
            exit 1
          fi

          DIST="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST"

          cp "$APK" "$DIST/GTAV-Runtime-Manager-debug.apk"
          sha256sum "$DIST/GTAV-Runtime-Manager-debug.apk" \
            > "$DIST/SHA256SUMS.txt"

          echo "dist=$DIST" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-APK
          path: ${{ steps.apk.outputs.dist }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-Build-Log
          path: gradle-build.log
          if-no-files-found: ignore
