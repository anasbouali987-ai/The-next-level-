name: Build GTAV Runtime Manager v1.4.1 APK

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Locate and extract v1.4.1 source
        id: source
        shell: bash
        run: |
          set -euo pipefail

          WORK_DIR="$RUNNER_TEMP/gtav-runtime-manager-v1.4.1"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          PROJECT_DIR=""

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            -not -path "*/.git/*" \
            -not -path "*/build/*" \
            | head -n 1 || true)"

          if [ -n "$SETTINGS_FILE" ]; then
            PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          else
            SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" \
              -maxdepth 4 \
              -type f \
              \( -iname "*v1.4.1*.zip" -o -iname "*Advanced*Combined*Source*.zip" \) \
              | head -n 1 || true)"

            if [ -z "$SOURCE_ZIP" ]; then
              SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" \
                -maxdepth 4 \
                -type f \
                -iname "*.zip" \
                | head -n 1 || true)"
            fi

            if [ -z "$SOURCE_ZIP" ]; then
              echo "::error::لم يتم العثور على مشروع Android أو ملف ZIP للمصدر."
              exit 1
            fi

            echo "Extracting source: $SOURCE_ZIP"
            unzip -q "$SOURCE_ZIP" -d "$WORK_DIR"

            SETTINGS_FILE="$(find "$WORK_DIR" \
              -type f \
              \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
              | head -n 1 || true)"

            if [ -z "$SETTINGS_FILE" ]; then
              echo "::error::لم يتم العثور على settings.gradle بعد فك المصدر."
              find "$WORK_DIR" -maxdepth 8 -type f | sort
              exit 1
            fi

            PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          fi

          if [ ! -f "$PROJECT_DIR/app/build.gradle.kts" ] && [ ! -f "$PROJECT_DIR/app/build.gradle" ]; then
            echo "::error::لم يتم العثور على app module داخل: $PROJECT_DIR"
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory: $PROJECT_DIR"

      - name: Validate Gradle configuration
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          gradle \
            --no-daemon \
            --stacktrace \
            --console=plain \
            projects

      - name: Compile application
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --stacktrace \
            --console=plain \
            :app:compileDebugJavaWithJavac \
            2>&1 | tee "$GITHUB_WORKSPACE/compile.log"

      - name: Build debug APK
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --stacktrace \
            --console=plain \
            :app:assembleDebug \
            2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug" \
            -type f \
            -name "*.apk" \
            | head -n 1 || true)"

          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::لم يتم إنشاء APK."
            exit 1
          fi

          OUT="$GITHUB_WORKSPACE/output"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          FINAL_APK="$OUT/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$FINAL_APK"

          unzip -Z1 "$FINAL_APK" | sort > "$OUT/apk-contents.txt"
          sha256sum "$FINAL_APK" > "$OUT/SHA256SUMS.txt"

          if ! grep -Eq '^lib/arm64-v8a/.*zstd.*\.so$' "$OUT/apk-contents.txt"; then
            echo "::error::مكتبة Zstandard الخاصة بـ arm64-v8a غير موجودة داخل APK."
            grep '^lib/' "$OUT/apk-contents.txt" || true
            exit 1
          fi

          echo "output_dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Build-Diagnostics
          path: |
            compile.log
            build.log
            **/app/build/reports/**
            **/app/build/test-results/**
            **/app/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
