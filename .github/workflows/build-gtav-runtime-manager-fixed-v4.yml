name: Build GTAV Runtime Manager APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gtav-runtime-manager-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find or extract Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_DIR="$RUNNER_TEMP/gtav-runtime-manager"
          mkdir -p "$EXTRACT_DIR"

          SETTINGS_FILE="$(
            find "$GITHUB_WORKSPACE" \
              -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              -not -path "*/.git/*" \
              -not -path "*/.gradle/*" \
              -not -path "*/build/*" \
              -print | sort | head -n 1
          )"

          if [ -z "${SETTINGS_FILE:-}" ]; then
            ZIP_FILE="$(
              find "$GITHUB_WORKSPACE" \
                -maxdepth 4 \
                -type f \
                -iname "*.zip" \
                -not -path "*/.git/*" \
                -print | sort | head -n 1
            )"

            if [ -z "${ZIP_FILE:-}" ]; then
              echo "::error::Android source project or ZIP archive was not found."
              exit 1
            fi

            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            SETTINGS_FILE="$(
              find "$EXTRACT_DIR" \
                -type f \
                \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
                -not -path "*/.gradle/*" \
                -not -path "*/build/*" \
                -print | sort | head -n 1
            )"
          fi

          if [ -z "${SETTINGS_FILE:-}" ]; then
            echo "::error::settings.gradle or settings.gradle.kts was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app" ]; then
            echo "::error::The app module was not found in: $PROJECT_DIR"
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Patch Java compatibility issues
        shell: bash
        run: |
          set -euo pipefail

          python3 - "$PROJECT_DIR" <<'PY'
          from pathlib import Path
          import sys

          root = Path(sys.argv[1])
          java_dir = root / "app" / "src" / "main" / "java"

          for path in java_dir.rglob("*.java"):
              text = path.read_text(encoding="utf-8")

              text = text.replace(
                  "Files.readString(file(c).toPath(),StandardCharsets.UTF_8)",
                  "new String(Files.readAllBytes(file(c).toPath()), StandardCharsets.UTF_8)"
              )

              text = text.replace(
                  "Files.readString(state.toPath(), StandardCharsets.UTF_8)",
                  "new String(Files.readAllBytes(state.toPath()), StandardCharsets.UTF_8)"
              )

              path.write_text(text, encoding="utf-8")
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:assembleDebug 2>&1 |
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          else
            gradle \
              --no-daemon \
              --stacktrace \
              --console=plain \
              clean :app:assembleDebug 2>&1 |
              tee "$GITHUB_WORKSPACE/gradle-build.log"
          fi

      - name: Collect APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(
            find "$PROJECT_DIR/app/build/outputs/apk/debug" \
              -type f \
              -name "*.apk" \
              -print | sort | head -n 1
          )"

          if [ -z "${APK_FILE:-}" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK file was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/dist"
          mkdir -p "$OUTPUT_DIR"

          cp "$APK_FILE" "$OUTPUT_DIR/GTAV-Runtime-Manager-debug.apk"
          sha256sum "$OUTPUT_DIR/GTAV-Runtime-Manager-debug.apk" \
            > "$OUTPUT_DIR/SHA256SUMS.txt"

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-Build-Log
          path: gradle-build.log
          if-no-files-found: ignore
