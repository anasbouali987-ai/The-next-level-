name: Build GTAV Runtime Manager v1.4.1 APK

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-disabled: true

      - name: Locate and extract Android source
        id: source
        shell: bash
        run: |
          set -euo pipefail

          WORK_DIR="$RUNNER_TEMP/gtav-runtime-manager-v141"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            -not -path "*/.git/*" \
            -not -path "*/build/*" \
            | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" \
              -maxdepth 6 \
              -type f \
              \( -iname "*v1.4.1*.zip" -o -iname "*Advanced*Combined*Source*.zip" \) \
              | head -n 1 || true)"

            if [ -z "$SOURCE_ZIP" ]; then
              SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" \
                -maxdepth 6 \
                -type f \
                -iname "*.zip" \
                | head -n 1 || true)"
            fi

            if [ -z "$SOURCE_ZIP" ]; then
              echo "::error::Source ZIP was not found."
              exit 1
            fi

            unzip -q "$SOURCE_ZIP" -d "$WORK_DIR"

            SETTINGS_FILE="$(find "$WORK_DIR" \
              -type f \
              \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
              | head -n 1 || true)"
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle(.kts) was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app/src/main/java" ]; then
            echo "::error::Android app module was not found."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply stable v1.4.1 compatibility patch
        shell: bash
        run: |
          set -euo pipefail

          JAVA_DIR="$PROJECT_DIR/app/src/main/java/com/gtav/runtimemanager"
          test -d "$JAVA_DIR"

          python3 - "$JAVA_DIR" <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(sys.argv[1])

          coordinator = root / "RuntimeInstallCoordinator.java"
          text = coordinator.read_text(encoding="utf-8").replace("\ufeff", "")

          text = text.replace(
              "    private final RuntimeInstallJournal journal;\n"
              "    private volatile RuntimeInstallWatchdog watchdog;\n",
              ""
          )

          text = text.replace(
              "        journal = new RuntimeInstallJournal(context);\n",
              ""
          )

          text = text.replace(
              "        watchdog = new RuntimeInstallWatchdog(appContext);\n",
              ""
          )

          text = text.replace(
              "                RuntimeInstallWatchdog activeWatchdog = watchdog;\n"
              "                watchdog = null;\n"
              "                if (activeWatchdog != null) activeWatchdog.close();\n",
              ""
          )

          text = text.replace(
              "        if (snapshot != null) {\n"
              "            journal.append(snapshot, \"state\");\n"
              "            RuntimeInstallWatchdog activeWatchdog = watchdog;\n"
              "            if (activeWatchdog != null) activeWatchdog.observe(snapshot);\n"
              "        }\n",
              ""
          )

          coordinator.write_text(text, encoding="utf-8")

          app = root / "RuntimeManagerApp.java"
          if app.exists():
              text = app.read_text(encoding="utf-8").replace("\ufeff", "")
              text = text.replace(
                  "        RuntimeRecoveryManager.recover(this);\n",
                  ""
              )
              app.write_text(text, encoding="utf-8")

          diagnostics = root / "DiagnosticsExporter.java"
          if diagnostics.exists():
              text = diagnostics.read_text(encoding="utf-8").replace("\ufeff", "")
              text = text.replace(
                  '        files.put("reports/install_journal.jsonl", '
                  'new File(RuntimeLogWriter.reportsDir(context), '
                  '"install_journal.jsonl"));\n',
                  ""
              )
              text = text.replace(
                  '        files.put("reports/watchdog_report.txt", '
                  'new File(RuntimeLogWriter.reportsDir(context), '
                  '"watchdog_report.txt"));\n',
                  ""
              )
              diagnostics.write_text(text, encoding="utf-8")

          for name in (
              "RuntimeInstallJournal.java",
              "RuntimeInstallWatchdog.java",
              "RuntimeRecoveryManager.java",
          ):
              file = root / name
              if file.exists():
                  file.unlink()

          for java_file in root.glob("*.java"):
              data = java_file.read_text(encoding="utf-8").replace("\ufeff", "")
              java_file.write_text(data, encoding="utf-8")
          PY

      - name: Configure UTF-8 Java compilation
        shell: bash
        run: |
          set -euo pipefail

          APP_GRADLE="$PROJECT_DIR/app/build.gradle.kts"

          if [ -f "$APP_GRADLE" ] \
             && ! grep -q 'tasks.withType<JavaCompile>()' "$APP_GRADLE"; then
            cat >> "$APP_GRADLE" <<'KTS'

          tasks.withType<JavaCompile>().configureEach {
              options.encoding = "UTF-8"
          }
          KTS
          fi

      - name: Validate Gradle project
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          gradle \
            --no-daemon \
            --stacktrace \
            --console=plain \
            projects

      - name: Build debug APK
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle \
            --no-daemon \
            --stacktrace \
            --console=plain \
            --warning-mode all \
            clean :app:assembleDebug \
            2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log"

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug" \
            -type f \
            -name "*.apk" \
            | head -n 1 || true)"

          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          FINAL_APK="$OUTPUT_DIR/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$FINAL_APK"

          unzip -Z1 "$FINAL_APK" | sort > "$OUTPUT_DIR/apk-contents.txt"
          sha256sum "$FINAL_APK" > "$OUTPUT_DIR/SHA256SUMS.txt"

          if ! grep -Eq '^lib/arm64-v8a/.*zstd.*\.so$' \
              "$OUTPUT_DIR/apk-contents.txt"; then
            echo "::error::arm64-v8a Zstandard library is missing."
            grep '^lib/' "$OUTPUT_DIR/apk-contents.txt" || true
            exit 1
          fi

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload complete build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Build-Diagnostics
          path: |
            gradle-build-full.log
            **/app/build/reports/**
            **/app/build/test-results/**
            **/app/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
