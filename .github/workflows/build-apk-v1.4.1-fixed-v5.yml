name: Build GTAV Runtime Manager v1.4.1 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
          cache-disabled: true

      - name: Locate and extract Android source
        id: source
        shell: bash
        run: |
          set -euo pipefail

          WORK_DIR="$RUNNER_TEMP/gtav-runtime-manager-v141"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            -not -path "*/.git/*" \
            -not -path "*/build/*" \
            | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" \
              -maxdepth 6 \
              -type f \
              \( -iname "*v1.4.1*.zip" -o -iname "*Advanced*Combined*Source*.zip" -o -iname "*.zip" \) \
              | head -n 1 || true)"

            if [ -z "$SOURCE_ZIP" ]; then
              echo "::error::Source ZIP was not found."
              exit 1
            fi

            unzip -q "$SOURCE_ZIP" -d "$WORK_DIR"
            SETTINGS_FILE="$(find "$WORK_DIR" \
              -type f \
              \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
              | head -n 1 || true)"
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle(.kts) was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app/src/main/java" ]; then
            echo "::error::Android app module was not found."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply stable v1.4.1 compatibility patch
        shell: bash
        run: |
          set -euo pipefail

          JAVA_DIR="$PROJECT_DIR/app/src/main/java/com/gtav/runtimemanager"
          if [ ! -d "$JAVA_DIR" ]; then
            echo "::error::Java source directory not found: $JAVA_DIR"
            exit 1
          fi

          python3 - "$JAVA_DIR" <<'PY'
          from pathlib import Path
          import sys

          root = Path(sys.argv[1])

          # Patch RuntimeInstallCoordinator.java
          coordinator = root / "RuntimeInstallCoordinator.java"
          if coordinator.exists():
              text = coordinator.read_text(encoding="utf-8").replace("\ufeff", "")
              replacements = [
                  ('    private final RuntimeInstallJournal journal;\n    private volatile RuntimeInstallWatchdog watchdog;\n', ''),
                  ('        journal = new RuntimeInstallJournal(context);\n', ''),
                  ('        watchdog = new RuntimeInstallWatchdog(appContext);\n', ''),
                  ('                RuntimeInstallWatchdog activeWatchdog = watchdog;\n                watchdog = null;\n                if (activeWatchdog != null) activeWatchdog.close();\n', ''),
                  ('        if (snapshot != null) {\n            journal.append(snapshot, "state");\n            RuntimeInstallWatchdog activeWatchdog = watchdog;\n            if (activeWatchdog != null) activeWatchdog.observe(snapshot);\n        }\n', '')
              ]
              for old, new in replacements:
                  text = text.replace(old, new)
              coordinator.write_text(text, encoding="utf-8")

          # Patch other files
          for file_name, replacement in [
              ("RuntimeManagerApp.java", '        RuntimeRecoveryManager.recover(this);\n'),
              ("DiagnosticsExporter.java", '        files.put("reports/install_journal.jsonl"'),
              ("DiagnosticsExporter.java", '        files.put("reports/watchdog_report.txt"')
          ]:
              f = root / file_name
              if f.exists():
                  text = f.read_text(encoding="utf-8").replace("\ufeff", "")
                  text = text.replace(replacement, "")
                  f.write_text(text, encoding="utf-8")

          # Delete unnecessary files
          for name in ("RuntimeInstallJournal.java", "RuntimeInstallWatchdog.java", "RuntimeRecoveryManager.java"):
              f = root / name
              if f.exists():
                  f.unlink()

          # Clean BOM
          for java_file in root.glob("*.java"):
              data = java_file.read_text(encoding="utf-8").replace("\ufeff", "")
              java_file.write_text(data, encoding="utf-8")
          PY

      - name: Configure UTF-8 and memory
        shell: bash
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          set -euo pipefail
          APP_GRADLE="app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ] && ! grep -q 'JavaCompile' "$APP_GRADLE"; then
            cat >> "$APP_GRADLE" <<'KTS'

          tasks.withType<JavaCompile>().configureEach {
              options.encoding = "UTF-8"
          }
          KTS
          fi

          # Increase memory if needed
          echo "org.gradle.jvmargs=-Xmx4g" >> gradle.properties || true

      - name: Validate Gradle project
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: ./gradlew projects --no-daemon --stacktrace || gradle projects --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log" || \
          gradle clean :app:assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log"

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug" -type f -name "*.apk" | head -n 1 || true)"
          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          mkdir -p "$OUTPUT_DIR"
          FINAL_APK="$OUTPUT_DIR/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$FINAL_APK"

          unzip -Z1 "$FINAL_APK" | sort > "$OUTPUT_DIR/apk-contents.txt"
          sha256sum "$FINAL_APK" > "$OUTPUT_DIR/SHA256SUMS.txt"

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload complete build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Build-Diagnostics
          path: |
            gradle-build-full.log
            **/app/build/reports/**
            **/app/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
