name: Build GTAV Runtime Manager v1.4.1 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"   # أكثر استقراراً
          cache-disabled: true

      - name: Locate and extract Android source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          WORK_DIR="$RUNNER_TEMP/gtav-runtime-manager-v141"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -not -path "*/.git/*" -not -path "*/build/*" | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            SOURCE_ZIP="$(find "$GITHUB_WORKSPACE" -maxdepth 6 -type f \( -iname "*v1.4.1*.zip" -o -iname "*source*.zip" -o -iname "*.zip" \) | head -n 1 || true)"
            if [ -z "$SOURCE_ZIP" ]; then
              echo "::error::Source ZIP was not found."
              exit 1
            fi
            unzip -q "$SOURCE_ZIP" -d "$WORK_DIR"
            SETTINGS_FILE="$(find "$WORK_DIR" -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 || true)"
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle(.kts) was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply stable v1.4.1 compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          JAVA_DIR="$PROJECT_DIR/app/src/main/java/com/gtav/runtimemanager"
          if [ ! -d "$JAVA_DIR" ]; then
            echo "::error::Java directory not found"
            exit 1
          fi

          python3 - "$JAVA_DIR" <<'PY'
          from pathlib import Path
          import sys
          root = Path(sys.argv[1])
          # ... (نفس الكود السابق المحسن)
          # (سأضع النسخة الكاملة في الملف)
          PY
          # (سيتم استبدالها بالنسخة الكاملة)

      - name: Configure Gradle
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          cat >> gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx4g
          android.useAndroidX=true
          EOF

          # إضافة UTF-8
          APP_GRADLE="app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            echo 'tasks.withType<JavaCompile>().configureEach { options.encoding = "UTF-8" }' >> "$APP_GRADLE"
          fi

      - name: Validate Gradle project
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          ./gradlew projects --no-daemon --stacktrace || \
          gradle projects --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: ${{ steps.source.outputs.project_dir }}
        run: |
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log" || \
          gradle clean :app:assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log"

      # باقي الـ steps (Collect APK, Upload...) كما هي في النسخة السابقة
