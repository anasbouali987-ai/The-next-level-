name: Build GTAV Runtime Manager v1.4.1 APK

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager             "platform-tools"             "platforms;android-36"             "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          cache-disabled: true

      - name: Extract Android source
        id: source
        shell: bash
        run: |
          set -euo pipefail

          WORK_DIR="$RUNNER_TEMP/gtav-runtime-manager-v141"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE"             -type f             \( -name "settings.gradle" -o -name "settings.gradle.kts" \)             -not -path "*/.git/*"             -not -path "*/build/*"             | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            SOURCE_ZIP="$(find "$GITHUB_WORKSPACE"               -maxdepth 5               -type f               \( -iname "*v1.4.1*.zip" -o -iname "*Advanced*Combined*Source*.zip" \)               | head -n 1 || true)"

            if [ -z "$SOURCE_ZIP" ]; then
              SOURCE_ZIP="$(find "$GITHUB_WORKSPACE"                 -maxdepth 5                 -type f                 -iname "*.zip"                 | head -n 1 || true)"
            fi

            if [ -z "$SOURCE_ZIP" ]; then
              echo "::error::Source ZIP was not found."
              exit 1
            fi

            unzip -q "$SOURCE_ZIP" -d "$WORK_DIR"

            SETTINGS_FILE="$(find "$WORK_DIR"               -type f               \( -name "settings.gradle" -o -name "settings.gradle.kts" \)               | head -n 1 || true)"
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle(.kts) was not found."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          if [ ! -d "$PROJECT_DIR/app/src/main" ]; then
            echo "::error::Android app module was not found in $PROJECT_DIR"
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Apply v1.4.1 compile fixes
        shell: bash
        run: |
          set -euo pipefail

          JAVA_DIR="$PROJECT_DIR/app/src/main/java/com/gtav/runtimemanager"

          python3 - "$JAVA_DIR" <<'PY'
          from pathlib import Path
          import sys

          java_dir = Path(sys.argv[1])

          journal = java_dir / "RuntimeInstallJournal.java"
          if journal.exists():
              text = journal.read_text(encoding="utf-8")

              if "private final Context appContext;" not in text:
                  text = text.replace(
                      "private final File file;",
                      "private final Context appContext;\n    private final File file;"
                  )

              text = text.replace(
                  "RuntimeInstallJournal(Context context) {\n        file = new File(RuntimeLogWriter.reportsDir(context), \"install_journal.jsonl\");",
                  "RuntimeInstallJournal(Context context) {\n        appContext = context.getApplicationContext();\n        file = new File(RuntimeLogWriter.reportsDir(appContext), \"install_journal.jsonl\");"
              )

              text = text.replace(
                  "RuntimeCrashReporter.record(RuntimeInstallCoordinator.applicationContext(),\n                    \"journal-write\", error, snapshot);",
                  "RuntimeCrashReporter.record(appContext,\n                    \"journal-write\", error, snapshot);"
              )

              journal.write_text(text, encoding="utf-8")

          watchdog = java_dir / "RuntimeInstallWatchdog.java"
          if watchdog.exists():
              text = watchdog.read_text(encoding="utf-8")
              text = text.replace("            t.setDaemon(true);\n", "")
              watchdog.write_text(text, encoding="utf-8")
          PY

          APP_GRADLE="$PROJECT_DIR/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ] && ! grep -q 'tasks.withType<JavaCompile>()' "$APP_GRADLE"; then
            cat >> "$APP_GRADLE" <<'KTS'

          tasks.withType<JavaCompile>().configureEach {
              options.encoding = "UTF-8"
          }
          KTS
          fi

      - name: Validate project configuration
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -euo pipefail
          gradle             --no-daemon             --stacktrace             --console=plain             projects

      - name: Build debug APK
        working-directory: ${{ steps.source.outputs.project_dir }}
        shell: bash
        run: |
          set -o pipefail
          gradle             --no-daemon             --stacktrace             --console=plain             --warning-mode all             clean :app:assembleDebug             2>&1 | tee "$GITHUB_WORKSPACE/gradle-build-full.log"

      - name: Collect and validate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug"             -type f             -name "*.apk"             | head -n 1 || true)"

          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::APK was not generated."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          FINAL_APK="$OUTPUT_DIR/GTAV-Runtime-Manager-v1.4.1-debug.apk"
          cp "$APK_FILE" "$FINAL_APK"

          unzip -Z1 "$FINAL_APK" | sort > "$OUTPUT_DIR/apk-contents.txt"
          sha256sum "$FINAL_APK" > "$OUTPUT_DIR/SHA256SUMS.txt"

          if ! grep -Eq '^lib/arm64-v8a/.*zstd.*\.so$' "$OUTPUT_DIR/apk-contents.txt"; then
            echo "::error::arm64-v8a Zstandard library is missing from APK."
            grep '^lib/' "$OUTPUT_DIR/apk-contents.txt" || true
            exit 1
          fi

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-APK
          path: ${{ steps.apk.outputs.output_dir }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload full diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GTAV-Runtime-Manager-v1.4.1-Full-Build-Log
          path: |
            gradle-build-full.log
            **/app/build/reports/**
            **/app/build/test-results/**
            **/app/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
